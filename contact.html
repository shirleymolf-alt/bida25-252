<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shirley's Nail Plug</title>
    <link rel="stylesheet" href="style.css/style.css">

   <style>
    form {
            width: 400px;
            margin: auto ;
            margin-top: 50px;
            margin-bottom: 50px;
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px  rgba(0,0,0,0.1);
            margin-left: 40px;
        }
        
        label {
            display: block;
            margin-top: 15px;  
            font-weight: bold; 
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            background-color: #F4C2C2;
            opacity: 39%;
            border: 2px solid #C9A227;
            border-radius: 15px;    
        }

        textarea {
            height: 120px;
            resize: none;    
        }

        .buttons{
            margin-top: 20px;
            text-align: center;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;    
        }

        .submit-btn {
            background-color: #EA8F8F;
            color: white;
            border: 3px solid #C9A227;
            border-radius: 15px;
        }

        .clear-btn {
            background-color: #EA8F8F ;
            color: white;
            border: 3px solid #C9A227;
            border-radius: 15px;
            margin-right: 10px;

        }
        button:hover {
            opacity: 0.9;   
        }

        .header {
          text-align: center;

        }


   </style> 
</head>
<body>
<header>
  <div class="navbar">
    <ul>
      <li><a href="index.html">HOME</a></li>
      <li><a href="about.html">ABOUT</a></li>
      <li><a href="services.html">SERVICES</a></li>
      <li><a href="gallery.html">GALLERY</a></li>
      <li><a href="contact.html">CONTACT</a></li>
      <li><a href="feedback.html">FEEDBACK</a></li>
      
    </ul>
    <img src="../logo/Shirley's Nail Plug logo design.png" alt="Logo"/>
  </div>
</header>

<section>
  <div class="contact form">

     <div class="sentence">
      <h3>Select your preferred appointment date and complete the form below.</h3>
     </div>
    
    <form action="acknowlegement.html" method="get">

      <div class="header">
          <h3>CONTACT FORM</h3>
      </div>
      
          <label for="name">FULL NUMBER</label>
          <input type="text" id="name" name="name" required>

          <label for="phone">PHONE NUMBER</label>
          <input type="number" id="phone" name="phone" required>
          
          <label for="email">EMAIL ADDRESS</label>
          <input type="email" id="email" name="email" required>
          
          <label for="message">MESSAGE</label>
          <textarea id="message" name="message" required></textarea>

          <div class="buttons">
              <button type="reset" class="clear-btn">Clear</button>
              <button type="submit" class="submit-btn">Submit</button>   
          </div>
      </form>

    
    
  </div>
</section>
  
 
</body>
</html>
